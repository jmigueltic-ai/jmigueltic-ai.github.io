<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Unificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/umd/index.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        #app-frame { border: none; width: 100%; height: 100%; display: none; background: white; }
        .back-btn { 
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            background: rgba(15, 23, 42, 0.95); color: white; border: none;
            padding: 12px 24px; border-radius: 16px; cursor: pointer; display: none;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); font-size: 13px;
            font-weight: 800; transition: all 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .back-btn:hover { background: #ef4444; transform: scale(1.05); }
        .loader-big { border: 4px solid #f1f5f9; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="login-screen" class="w-full max-w-md p-10 bg-white rounded-[2.5rem] shadow-2xl mx-4">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-5">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Acceso Seguro</h2>
            <p class="text-slate-400 text-sm mt-2">Selecciona un programa o introduce la clave</p>
        </div>

        <div id="form-container" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">Seleccionar Programa</label>
                <select id="program-selector" onchange="handleSelection()"
                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none font-bold text-slate-700 transition-all appearance-none cursor-pointer">
                    <option value="">-- Elige un programa --</option>
                    <option value="laboral">Control laboral Moncobra</option><option value="costes">Control de costes</option><option value="pdf">Editor de pdfs</option><option value="iso">Calculadora Isométricos</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">Contraseña</label>
                <input type="password" id="entry-pass" autofocus
                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none text-center text-xl font-bold transition-all shadow-inner"
                    placeholder="••••••••">
            </div>

            <button onclick="checkAccess()" id="entry-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl transition-all active:scale-95 shadow-xl shadow-blue-100 uppercase tracking-widest">
                Desbloquear
            </button>
        </div>
        
        <div id="loading-state" class="hidden text-center py-10">
            <div class="loader-big"></div>
            <p class="text-blue-600 font-bold animate-pulse">DESCOMPRIMIENDO DATOS...</p>
        </div>

        <p id="error-msg" class="text-rose-500 text-xs font-bold mt-6 opacity-0 transition-opacity text-center">CONTRASEÑA INCORRECTA</p>
    </div>

    <button id="back-to-login" class="back-btn" onclick="location.reload()">🔒 CERRAR SESIÓN</button>
    <iframe id="app-frame"></iframe>

        function handleSelection() {
            const selector = document.getElementById('program-selector');
            const passInput = document.getElementById('entry-pass');
            if (selector.value) {
                passInput.value = selector.value;
                passInput.focus();
            }
        }

        async function checkAccess() {
            const passInput = document.getElementById('entry-pass').value;
            const errorMsg = document.getElementById('error-msg');
            const formContainer = document.getElementById('form-container');
            const loadingState = document.getElementById('loading-state');
            
            const app = apps.find(a => a.p === passInput);
            
            if(app) {
                formContainer.classList.add('hidden');
                loadingState.classList.remove('hidden');
                
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        try {
                            launchApp(app.c);
                        } catch(e) {
                            console.error(e);
                            alert("Error al cargar el programa.");
                            location.reload();
                        }
                    }, 50);
                });
            } else {
                errorMsg.style.opacity = "1";
                document.getElementById('entry-pass').value = "";
                setTimeout(() => errorMsg.style.opacity = "0", 2000);
            }
        }

        function launchApp(base64Compressed) {
            const binaryString = atob(base64Compressed);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            const decompressed = fflate.unzlibSync(bytes);
            const decoded = new TextDecoder().decode(decompressed);

            const frame = document.getElementById('app-frame');
            const login = document.getElementById('login-screen');
            const backBtn = document.getElementById('back-to-login');
            
            login.style.display = 'none';
            frame.style.display = 'block';
            backBtn.style.display = 'block';
            
            const doc = frame.contentWindow.document;
            doc.open();
            doc.write(decoded);
            doc.close();
        }

        document.getElementById('entry-pass').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') checkAccess();
        });
    </script>
</body>
</html>
